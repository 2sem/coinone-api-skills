name: Check Coinone API Updates

on:
  schedule:
    - cron: '0 0 * * 1'  # Monday 00:00 UTC = 09:00 KST
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.status }}
      latest_title: ${{ steps.check.outputs.latest_title }}
      latest_date: ${{ steps.check.outputs.latest_date }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure api-update label exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create api-update --color 0075ca --description "Coinone API changelog update" 2>/dev/null || true

      - name: Check RSS for new entries
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/check-changelog.py

  update-docs:
    needs: check
    if: needs.check.outputs.status == 'HAS_UPDATES' || needs.check.outputs.status == 'FIRST_RUN'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch changelog content
        run: |
          curl -s https://docs.coinone.co.kr/changelog.rss > /tmp/changelog.rss
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, json

          root = ET.parse('/tmp/changelog.rss').getroot()
          entries = []
          for item in root.findall('.//item'):
              entries.append({
                  'title': (item.findtext('title') or '').strip(),
                  'pubDate': (item.findtext('pubDate') or '').strip(),
                  'link': (item.findtext('link') or '').strip(),
                  'description': (item.findtext('description') or '').strip(),
              })
          with open('/tmp/changelog-entries.json', 'w') as f:
              json.dump(entries, f, ensure_ascii=False, indent=2)
          print(f"Fetched {len(entries)} entries")
          EOF

      - name: Pre-grep — check if docs already cover this entry
        id: pregrep
        env:
          ENTRY_TITLE: ${{ needs.check.outputs.latest_title }}
        run: python3 .github/scripts/pre-grep.py

      - name: Create issue (always) and close if already documented
        if: steps.pregrep.outputs.skip == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_URL=$(gh issue create \
            --title "Coinone API updated: ${{ needs.check.outputs.latest_title }}" \
            --label api-update \
            --body "$(printf '**pubDate:** %s\n\nDocumentation already up to date — no file changes needed.' \
              '${{ needs.check.outputs.latest_date }}')")
          echo "Created issue: $ISSUE_URL"
          gh issue close "$ISSUE_URL" --comment "Pre-grep: all terms already documented in references/. Claude not invoked."

      - name: Update docs via Claude (only if terms missing)
        if: steps.pregrep.outputs.skip == 'false'
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          allowed_tools: "Bash,Edit,Glob,Grep,LS,Read,Write"
          claude_env: |
            GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Coinone API changelog has a new entry.

            Title: "${{ needs.check.outputs.latest_title }}"
            pubDate: ${{ needs.check.outputs.latest_date }}
            Target file: ${{ steps.pregrep.outputs.target_file }}

            Entry details are in /tmp/changelog-entries.json — read only the first entry
            (or entries newer than the previous api-update issue if HAS_UPDATES).

            Do this:

            1. Create a GitHub issue:
               - Title: "Coinone API updated: ${{ needs.check.outputs.latest_title }}"
               - Label: api-update
               - Body line 1 (exact): **pubDate:** ${{ needs.check.outputs.latest_date }}
               - Then: 2-3 line summary from the RSS description

            2. Check ONLY "${{ steps.pregrep.outputs.target_file }}" (or references/ if blank).
               Make surgical edits if something is genuinely missing or wrong.

            3. If files changed: commit, push branch docs/sync-coinone-api-${{ github.run_id }}, create PR linked to issue.
               If no changes: comment "Documentation already up to date" on issue and close it.

            Rules: never log secrets. No detail page fetching. Targeted edits only.
