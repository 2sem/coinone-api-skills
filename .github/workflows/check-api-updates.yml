name: Check Coinone API Updates

on:
  schedule:
    - cron: '0 0 * * 1'  # Monday 00:00 UTC = 09:00 KST
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.status }}
      latest_title: ${{ steps.check.outputs.latest_title }}
      latest_date: ${{ steps.check.outputs.latest_date }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure api-update label exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create api-update --color 0075ca --description "Coinone API changelog update" 2>/dev/null || true

      - name: Check RSS for new entries
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 .github/scripts/check-changelog.py

  update-docs:
    needs: check
    if: needs.check.outputs.status == 'HAS_UPDATES' || needs.check.outputs.status == 'FIRST_RUN'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch changelog content
        id: fetch
        run: |
          curl -s https://docs.coinone.co.kr/changelog.rss > /tmp/changelog.rss
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, json, os

          root = ET.parse('/tmp/changelog.rss').getroot()
          entries = []
          for item in root.findall('.//item'):
              entries.append({
                  'title': (item.findtext('title') or '').strip(),
                  'pubDate': (item.findtext('pubDate') or '').strip(),
                  'link': (item.findtext('link') or '').strip(),
                  'description': (item.findtext('description') or '').strip(),
              })

          with open('/tmp/changelog-entries.json', 'w') as f:
              json.dump(entries, f, ensure_ascii=False, indent=2)

          print(f"Fetched {len(entries)} entries")
          EOF

          cat /tmp/changelog-entries.json

      - name: Update docs via Claude
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mode: agent
          allowed_tools: "Bash,Edit,Glob,Grep,LS,Read,Write"
          claude_env: |
            GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            New Coinone API changelog entry detected.
            Status: ${{ needs.check.outputs.status }}
            Latest entry: "${{ needs.check.outputs.latest_title }}" (${{ needs.check.outputs.latest_date }})

            Changelog entries are pre-fetched at /tmp/changelog-entries.json — read that file.

            Do this in order:

            1. Read /tmp/changelog-entries.json to get all entries.
               - If FIRST_RUN: treat all entries as new.
               - If HAS_UPDATES: run `gh issue list --label api-update --state all --limit 1 --json body`
                 to get the previous pubDate, then identify entries newer than it.

            2. Create a GitHub issue using `gh issue create`:
               - Title: "Coinone API updated: ${{ needs.check.outputs.latest_title }}"
               - Label: api-update
               - Body must start with this line exactly:
                 **pubDate:** ${{ needs.check.outputs.latest_date }}
               - Then summarize what changed based on the entry titles and descriptions.

            3. Update relevant `references/` files based on what changed.
               Surgical edits only — only files related to actual changes.

            4. Commit and push changes, then create a PR:
               - Branch: docs/sync-coinone-api-${{ github.run_id }}
               - Title: "docs: sync with Coinone API changelog"
               - Body: link to issue + list of files changed

            Hard rules:
            - The **pubDate:** line in the issue body must be exact — the check script parses it
            - Do not rewrite unrelated reference files
